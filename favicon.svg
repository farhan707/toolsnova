<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0c0c0e"/>

  <!-- Subtle outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#7fff6f" stroke-width="1.5" opacity="0.2"/>

  <!-- Nova 4-point star -->
  <polygon points="32,6 37,27 58,32 37,37 32,58 27,37 6,32 27,27" fill="#7fff6f"/>

  <!-- Center hole -->
  <circle cx="32" cy="32" r="7" fill="#0c0c0e"/>

  <!-- Center bright dot -->
  <circle cx="32" cy="32" r="4" fill="#7fff6f"/>

</svg>
